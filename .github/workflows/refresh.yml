name: Refresh data

# Hourly: backfill lookback window → DuckDB/dbt marts → snapshot on `data` branch.
# Vercel rebuilds the Evidence dashboard via deploy hook (production branch = data).

on:
  schedule:
    - cron: "20 * * * *" # minute 20 (stagger vs crypto-market-elt at :05)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Restore previous snapshot from data branch
        run: |
          git fetch origin data || true
          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            git restore --source origin/data -- dashboard/sources/lp/lp_marts.duckdb || true
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked

      - name: Backfill + verify (Alchemy)
        env:
          LP_ETH_RPC_URL: ${{ secrets.LP_ETH_RPC_URL }}
        run: uv run python -m lp_history.run

      - name: Build warehouse (NFT snapshot + DuckDB raw)
        env:
          LP_ETH_RPC_URL: ${{ secrets.LP_ETH_RPC_URL }}
        run: uv run python -m lp_history.build_warehouse

      - name: Transform (dbt build + tests)
        env:
          LP_DUCKDB_PATH: warehouse/lp.duckdb
        run: uv run dbt build --project-dir dbt --profiles-dir dbt

      - name: Export marts snapshot
        run: uv run python -m lp_history.export_snapshot

      - name: Publish snapshot to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B data
          git add -f dashboard/sources/lp/lp_marts.duckdb
          git commit -m "chore: refresh LP marts snapshot" || echo "No snapshot changes"
          git push --force origin data

      - name: Trigger Vercel rebuild
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set; skipping."
            exit 0
          fi
          curl -sf -X POST "$VERCEL_DEPLOY_HOOK_URL" > /dev/null
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

      - name: Telegram notification
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN not set; skipping."
            exit 0
          fi
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="✅ lp-history-reconstructor: dashboard updated ($(date -u +'%Y-%m-%d %H:%M UTC'))" \
            > /dev/null
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Telegram alert on failure
        if: failure()
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN not set; skipping."
            exit 0
          fi
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ lp-history-reconstructor: refresh failed — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /dev/null
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
